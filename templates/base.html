<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="main-layout">
        <!-- 1. SIDEBAR (STAYS THE SAME) -->
        <div class="sidebar">
            <div class="sidebar-top">
                <h2>SideHustle</h2>
                <div class="sidebar-menu">
                    <a href="{{ url_for('marketplace') }}">🏠 Marketplace</a>
                    <a href="{{ url_for('dashboard') }}">📊 Dashboard</a>
                    <a href="{{ url_for('my_task') }}">📋 My Task</a>
                    <a href="#">👤 Profile</a>
                </div>
            </div>
        </div>

        <!-- 2. TOP NAV (WITH BELL POPUP) -->
        <div class="top-nav">
            <div class="nav-icons">
                <div class="notification-container" style="position: relative;">
                    <span id="bell-icon" style="cursor: pointer; font-size: 22px;">🔔</span>
                    <div id="notification-popup" class="notification-popup">
                        <div class="popup-header">Notifications</div>
                            <div class="popup-body">
                                {% if notifications %}
                                    {% for note in notifications %}
                                        <a href="{{ url_for('task_detail', task_id=note.task_id) }}" class="notification-item">
                                            <span class="note-title">
                                                <span>✨</span> Job Update
                                            </span>
                                            <span class="note-msg">{{ note.message }}</span>
                                            <span class="note-time">Just Now</span>
                                        </a>
                                    {% endfor %}
                                {% else %}
                                    <div class="empty-notif">
                                        <p>😴 All caught up!</p>
                                    </div>
                                {% endif %}
                            </div>
                    </div>
                </div>
                <div class="profile-circle"></div>
            </div>
        </div>

        <!-- 3. THIS IS THE MAGIC PART -->
        <div class="content">
            {% block content %}{% endblock %}
        </div>
    </div>

    <!-- 4. JAVASCRIPT (WORKS ON EVERY PAGE) -->
    <script>
        const bell = document.getElementById('bell-icon');
        const popup = document.getElementById('notification-popup');
        bell.addEventListener('click', (e) => {
            e.stopPropagation();
            popup.style.display = popup.style.display === 'block' ? 'none' : 'block';
        });
        window.onclick = () => popup.style.display = 'none';
    </script>
</body>
</html>
