<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>SideHustle</title>
</head>
<body>
    <div class="main-layout">
        <div class="sidebar">
            <div class="sidebar-top">
                <h2>SideHustle</h2>
                <div class="sidebar-menu">
                    <a href="{{ url_for('marketplace') }}">🏠 Marketplace</a>
                    <a href="{{ url_for('dashboard') }}">📊 Dashboard</a>
                    <a href="{{ url_for('my_task') }}" style="position: relative;">
                        📋 My Task 
                        <span id="global-nav-dot" class="dot-small" style="display: none;"></span>
                    </a>
                    <a href="#">👤 Profile</a>
                </div>
            </div>
            <div class="sidebar-bottom">
                <a href="#" class="menu-item">❓ Help</a>
            </div>
        </div>

        <div class="top-nav">
            <div class="nav-icons">
                <div class="notification-container" style="position: relative;">
                    <span id="bell-icon" style="cursor: pointer; font-size: 22px; position: relative; z-index: 3001;">🔔</span>
                    <div id="notification-popup" class="notification-popup" style="display: none; position: absolute; top: 50px; right: 0; z-index: 9999; background: white; border: 1px solid #ddd; border-radius: 12px; width: 300px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
                        <div class="popup-header" style="padding: 15px; border-bottom: 1px solid #eee; font-weight: bold; color: #333;">Notifications</div>
                        <div class="popup-body">
                            {% if notifications %}
                                {% for note in notifications %}
                                    <a href="{{ url_for('task_detail', task_id=note.task_id) }}" class="notification-item" style="display: block; padding: 15px; text-decoration: none; border-bottom: 1px solid #f5f5f5;">
                                        <span class="note-title" style="display: block; color: #5a32a8; font-weight: bold;">✨ Job Update</span>
                                        <span class="note-msg" style="display: block; color: #666; font-size: 13px;">{{ note.message }}</span>
                                        <span class="note-time" style="display: block; color: #999; font-size: 11px;">Just Now</span>
                                    </a>
                                {% endfor %}
                            {% else %}
                                <div class="empty-notif" style="padding: 40px; text-align: center; color: #999;">All caught up!</div>
                            {% endif %}
                        </div>
                    </div>
                </div>
                <div class="profile-circle"></div>
            </div>
        </div>

        <div class="content">
            {% block content %}{% endblock %}
        </div>
    </div>

    <script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>
    <script>
        // 铃铛弹窗逻辑
        const bell = document.getElementById('bell-icon');
        const popup = document.getElementById('notification-popup');

        bell.addEventListener('click', (e) => {
            e.stopPropagation();
            popup.style.display = (popup.style.display === 'block') ? 'none' : 'block';
        });

        document.addEventListener('click', (e) => {
            if (popup && !popup.contains(e.target) && e.target !== bell) {
                popup.style.display = 'none';
            }
        });

        // 全局 Socket 逻辑
        const globalSocket = io();
        globalSocket.on('new_unread', function(data) {
            const navDot = document.getElementById('global-nav-dot');
            if (navDot) navDot.style.display = 'inline-block';

            // 更新 My Task 页面内的 Tab 红点
            const createdDot = document.getElementById('created-unread-dot');
            const appliedDot = document.getElementById('applied-unread-dot');
            if (data.role === 'created' && createdDot) createdDot.style.display = 'inline-block';
            else if (data.role === 'applied' && appliedDot) appliedDot.style.display = 'inline-block';

            // 更新聊天按钮数字
            const chatBtn = document.querySelector(`a[href*="chat/${data.task_id}"], a[href*="group_chat/${data.task_id}"]`);
            if (chatBtn) {
                let badge = chatBtn.querySelector('.unread-badge');
                if (!badge) {
                    badge = document.createElement('span');
                    badge.className = 'unread-badge';
                    badge.innerText = '1';
                    chatBtn.appendChild(badge);
                } else {
                    badge.innerText = parseInt(badge.innerText) + 1;
                }
            }
        });
    </script>
</body>
</html>
