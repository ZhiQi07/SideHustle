<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
            <div class="main-layout">
                <!-- 1. SIDEBAR (STAYS THE SAME) -->
                <div class="sidebar">
                    <div class="sidebar-top">
                        <h2>SideHustle</h2>
                    <div class="sidebar-menu">
            <a href="{{ url_for('marketplace') }}">🏠 Marketplace</a>
            <a href="{{ url_for('dashboard') }}">📊 Dashboard</a>
            <a href="{{ url_for('my_task') }}" style="position: relative;">
                📋 My Task 
                <!-- 这个 span 是关键！id 方便 JS 操控，style 默认隐藏 -->
                <span id="global-nav-dot" class="dot-small" style="display: none;"></span>
            </a>
            <a href="#">👤 Profile</a>
        </div>

<!-- 2. 导航栏部分：确保铃铛容器有 position: relative -->
<div class="top-nav">
    <div class="nav-icons">
        <div class="notification-container" style="position: relative;"> <!-- 必须加这个 -->
            <span id="bell-icon" style="cursor: pointer; font-size: 22px; position: relative; z-index: 3001;">🔔</span>
            <div id="notification-popup" class="notification-popup" style="display: none; position: absolute; top: 50px; right: 0; z-index: 9999;">
                <div class="popup-header">Notifications</div>
                <div class="popup-body">
                    {% if notifications %}
                        {% for note in notifications %}
                            <a href="{{ url_for('task_detail', task_id=note.task_id) }}" class="notification-item">
                                <span class="note-title">✨ Job Update</span>
                                <span class="note-msg">{{ note.message }}</span>
                                <span class="note-time">Just Now</span>
                            </a>
                        {% endfor %}
                    {% else %}
                        <div class="empty-notif">All caught up!</div>
                    {% endif %}
                </div>
            </div>
        </div>
        <div class="profile-circle"></div>
    </div>
</div>

        <!-- 3. THIS IS THE MAGIC PART -->
        <div class="content">
            {% block content %}{% endblock %}
        </div>
    </div>

    <!-- 4. JAVASCRIPT (WORKS ON EVERY PAGE) -->
   <script>
    const bell = document.getElementById('bell-icon');
    const popup = document.getElementById('notification-popup');

    bell.addEventListener('click', (e) => {
        e.stopPropagation();
        // 强制切换显示/隐藏，并确保它是以 'block' 模式显示
        if (popup.style.display === 'block') {
            popup.style.display = 'none';
        } else {
            popup.style.display = 'block';
        }
    });

    // 点击页面其他地方关闭弹窗
    document.addEventListener('click', (e) => {
        if (!popup.contains(e.target) && e.target !== bell) {
            popup.style.display = 'none';
        }
    });


    bell.addEventListener('click', (e) => {
    e.stopPropagation();
    console.log("Bell clicked!"); // 检查控制台有没有印这个
    popup.style.display = (popup.style.display === 'block') ? 'none' : 'block';
});

</script>


<script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>
<script>
    const globalSocket = io();

    globalSocket.on('new_unread', function(data) {
        console.log("Global Notification Received:", data);

        // 1. 侧边栏红点 - 强制显示
        const navDot = document.getElementById('global-nav-dot');
        if (navDot) navDot.style.display = 'inline-block';

        // 2. 如果当前就在 My Task 页面，也点亮对应的选项卡
        const createdDot = document.getElementById('created-unread-dot');
        const appliedDot = document.getElementById('applied-unread-dot');
        
        if (data.role === 'created' && createdDot) {
            createdDot.style.display = 'inline-block';
        } else if (data.role === 'applied' && appliedDot) {
            appliedDot.style.display = 'inline-block';
        }

        // 3. 更新卡片上的数字 (如果当前页面有这个按钮)
        const chatBtn = document.querySelector(`a[href*="chat/${data.task_id}"], a[href*="group_chat/${data.task_id}"]`);
        if (chatBtn) {
            let badge = chatBtn.querySelector('.unread-badge');
            if (!badge) {
                badge = document.createElement('span');
                badge.className = 'unread-badge';
                badge.innerText = '1';
                chatBtn.appendChild(badge);
            } else {
                badge.innerText = parseInt(badge.innerText) + 1;
            }
        }
    });
</script>





</body>
</html>
