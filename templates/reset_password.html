<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
        <link rel="stylesheet" href="{{ url_for('static', filename='forgot_password.css') }}">
    </head>
<body class="forgot-body reset-page">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <p class="error-msg" style="color: #ff4d4d; font-weight: bold;">{{ message }}</p>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <h1 class="forgot-title">RESET PASSWORD</h1>
    <p class="forgot-subtitle">Enter your new password below</p>
    
    <form action="{{ url_for('update_password') }}" method="POST">
        <input type="password" name="new_password" placeholder="NEW PASSWORD" class="forgot-input" 
               pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" 
               title="Must contain at least 8 characters, one uppercase, one lowercase, and one number" required><br>

        <ul class="password-check">
            <li>At least 8 characters, 1 upper and 1 lowercase</li>
            <li>Include a number or symbol</li>
        </ul>

        <input type="password" name="confirm_new_password" placeholder="CONFIRM NEW PASSWORD" class="forgot-input" required><br>
        <button type="submit" class="forgot-confirm-btn">UPDATE PASSWORD</button>
    </form>
    
    <br>
    <a href="{{ url_for('forgot_password') }}" style="color: black; text-decoration: underline; font-size: 14px;">Cancel</a>
</body>
</html>
