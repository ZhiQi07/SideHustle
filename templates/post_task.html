<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="center-screen">
    <a href="/marketplace" class="back-link">← Back to Marketplace</a>
    <div class="form-card">
        <h2>CREATE NEW TASK</h2>
        <form method="POST">
            <label>Task Title</label>
            <input type="text" name="title" style="width: 100%; padding: 10px; margin: 10px 0;" required>

            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label>Budget (RM)</label>
                    <input type="number" name="price" style="width: 90%; padding: 10px;" required>
                </div>
                <div style="flex: 1;">
                    <label>People Needed</label>
                    <input type="number" name="capacity" style="width: 90%; padding: 10px;" placeholder="1">
                </div>
            </div>

            <label style="display: block; margin-top: 15px;">Deadline</label>
            <input type="date" name="deadline" style="width: 100%; padding: 10px;">

            <label style="display: block; margin-top: 15px;">Category</label>
            <select name="category" style="width: 100%; padding: 10px;">
                <option>Moving & Lifting</option>
                <option>Food & Delivery</option>
                <option>Academic & Education</option>
                <option>Creative & Digital</option>
                <option>Technical & IT</option>
            </select>

            <label style="display: block; margin-top: 15px;">Description</label>
            <textarea name="description" style="width: 100%; height: 80px;"></textarea>

            <label style="margin-top: 15px; display: inline-block;">
                <input type="checkbox" name="urgent"> Mark as <strong>URGENT</strong>
            </label>

            <button type="submit" class="btn-primary" style="margin-top: 20px;">Post Task</button>
        </form>
    </div>
</body>
</html>
