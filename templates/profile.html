{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='profile.css') }}">
<link rel='stylesheet' href='https://cdn-uicons.flaticon.com/uicons-regular-rounded/css/uicons-regular-rounded.css'>

<div class="profile-wrapper">
    <div class="tab-container">
        <button class="tab active">Profile Settings</button>
        <button class="tab">Security</button>
        <button class="tab">Notification</button>
        <button class="tab">History</button>
    </div>

    <div class="profile-main-card">
        
        <div class="profile-left-panel">
            <h3 class="section-title">PROFILE PHOTO</h3>
            <div class="avatar-box">
                <i class="fi fi-rr-pencil"></i>
            </div>
            <div class="photo-controls">
                <button class="small-btn">Remove photo</button>
                <button class="small-btn">Change photo</button>
            </div>
            
            <div class="log-out-delete">
                <a href="{{ url_for('login') }}" class="logout-link-btn">LOG OUT</a>
                <button class="delete-acc-btn">DELETE ACCOUNT</button>
            </div>
        </div>

        <div class="profile-right-panel">
            <div class="detail-row" id="row-displayname">
                <label>DISPLAY NAME</label>
                <div class="field-content">
                    <span class="view-mode">{{ user.display_name if user.display_name else user.username }}</span>
                    <form action="{{ url_for('update_profile') }}" method="POST" class="edit-mode" style="display:none;">
                        <input type="hidden" name="field" value="displayname">
                        <input type="text" name="value" value="{{ user.display_name or user.username }}" class="inline-input">
                        <button type="submit" class="save-inline-btn">Save</button>
                    </form>
                    <button class="edit-btn view-mode" onclick="toggleEdit('displayname')">Edit</button>
                </div>
            </div>

            <div class="detail-row" id="row-username">
                <label>USERNAME</label>
                <div class="field-content">
                    <span class="view-mode">{{ user.username }}</span>
                    <form action="{{ url_for('update_profile') }}" method="POST" class="edit-mode" style="display:none;">
                        <input type="hidden" name="field" value="username">
                        <input type="text" name="value" value="{{ user.username }}" class="inline-input">
                        <button type="submit" class="save-inline-btn">Save</button>
                    </form>
                    <button class="edit-btn view-mode" onclick="toggleEdit('username')">Edit</button>
                </div>
            </div>

            <div class="detail-row">
                <label>EMAIL ADDRESS</label>
                <div class="field-content">
                    <span>{{ user.email }}</span>
                </div>
            </div>

            <div class="detail-row" id="row-bio">
                <label>Bio</label>
                <div class="field-content">
                    <span class="view-mode">{{ user.bio }}</span>
                    <form action="{{ url_for('update_profile') }}" method="POST" class="edit-mode" style="display:none;">
                        <input type="hidden" name="field" value="bio">
                        <input type="text" name="value" value="{{ user.bio }}" class="inline-input">
                        <button type="submit" class="save-inline-btn">Save</button>
                    </form>
                    <button class="edit-btn view-mode" onclick="toggleEdit('bio')">Edit</button>
                </div>
            </div>

            <div class="detail-row" id="row-skills">
                <label>Skills</label>
                <div class="field-content">
                    <span class="view-mode">{{ user.skills if user.skills else "No skills listed" }}</span>
                    <form action="{{ url_for('update_profile') }}" method="POST" class="edit-mode" style="display:none;">
                        <input type="hidden" name="field" value="skills">
                        <input type="text" name="value" value="{{ user.skills or '' }}" class="inline-input">
                        <button type="submit" class="save-inline-btn">Save</button>
                    </form>
                    <button class="edit-btn view-mode" onclick="toggleEdit('skills')">Edit</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function toggleEdit(rowId) {
        const row = document.getElementById('row-' + rowId);
        const viewElements = row.querySelectorAll('.view-mode');
        const editElements = row.querySelectorAll('.edit-mode');

        viewElements.forEach(el => el.style.display = 'none');
        editElements.forEach(el => el.style.display = 'flex');
    }
</script>
{% endblock %}
