{% extends "base.html" %}

{% block content %}
<div class="container edit-container">
    <!-- Back to specific source task link -->
    <a href="{{ url_for('task_detail', task_id=task.id) }}" class="back-link">← Back to Task</a>

    <div class="center-form-wrapper">
        <div class="form-card">
            <h2>APPLICATION FORM</h2>
            <p class="form-subtitle">Applying for: <strong>{{ task.title }}</strong> (RM {{ task.price | int }}/Person)</p>
            
            <form method="POST">
                <!-- Introduction Input Field Box -->
                <div class="form-group">
                    <label>Introduce Yourself</label>
                    <textarea name="intro" class="edit-textarea" placeholder="Share your name, major, and a quick greeting..." required></textarea>
                </div>
                
                <!-- Skill Fit Justification Box -->
                <div class="form-group">
                    <label>Why are you a good fit?</label>
                    <textarea name="reason" class="edit-textarea" placeholder="Detail any relevant skills or experiences that make you perfect for this gig..." required></textarea>
                </div>
                
                <!-- Processing Action Buttons -->
                <div class="form-actions">
                    <button type="submit" class="btn-primary" style="margin-top: 0;">Submit Application</button>
                    <a href="{{ url_for('task_detail', task_id=task.id) }}" class="btn-cancel">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
