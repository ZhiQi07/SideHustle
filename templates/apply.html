{% extends "base.html" %}
{% block content %}
<div style="display: flex; justify-content: center;">
    <div class="form-card" style="margin-top: 20px;">
        <a href="{{ url_for('task_detail', task_id=task.id) }}" class="back-link">← Back to Task</a>
        <h1 style="margin-top: 20px;">Apply for task</h1>
        <p style="color: #666; margin-bottom: 20px;">{{ task.title }}</p>
        <form method="POST">
            <div class="form-group">
                <label>Introduce yourself</label>
                <textarea name="intro" class="edit-textarea"></textarea>
            </div>
            <div class="form-group">
                <label>Explain why you're a good fit</label>
                <textarea name="reason" class="edit-textarea"></textarea>
            </div>
            <button type="submit" class="btn-primary">Submit Application</button>
        </form>
    </div>
</div>
{% endblock %}
