<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
    </head>
<body>
    <div class="left-branding">
        <div>
            <h1>SideHustle</h1>
        </div>
    </div>
    <div class="right-login">
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <p style="color: #ff4d4d; font-size: 13px; font-weight: bold; margin-bottom: 10px;">{{ message }}</p>
            {% endfor %}
          {% endif %}
        {% endwith %}
        
        <h2>
            LOGIN
        </h2>
        <form action="{{ url_for('login') }}" method="POST">
            <div class="input-container">
                <label class="input-icon user-icon"></label>
                <input type="email" name="email" placeholder="EMAIL ADDRESS" class="modern-input" required>
                <label class="input-icon lock-icon"></label>
                <input type="password" name="password" placeholder="Password" class="modern-input" required>
                <label class="input-icon eye-icon"></label>
            </div>

            <div class="forgot-container">
                <a href="/forgot" class="forgot-link">FORGOT PASSWORD</a>
            </div>
            
            <button type="submit" class="purple-btn">LOGIN</button>
        </form>

        <p class="auth-box-footer">
            Don't have an account? <a href="{{ url_for('signup') }}" class="inline-link">Sign up here</a>
        </p>
    </div>
</body>
</html>
